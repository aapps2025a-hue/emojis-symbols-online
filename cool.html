<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A‑Apps Login</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    font-family: "Segoe UI", sans-serif;
    color: white;
    height: 100vh;
    overflow: hidden;
  }
  #loginPage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  .card {
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    padding:30px;
    width:340px;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
  }
  h2 { text-align:center; margin-top:0; }
  input,button {
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:15px;
    box-sizing:border-box;
  }
  button {
    background:#4ea5ff;
    color:white;
    cursor:pointer;
  }
  .msg { text-align:center; min-height:20px; }
  .msg.error { color:#ff4e4e; }
  .msg.success { color:#7CFC7C; }
  .link { text-align:center; cursor:pointer; color:#a8d4ff; }
  .form { display:none; }
  .form.active { display:block; }

  /* WOW screen */

</style>
</head>
<body>

<!-- LOGIN UI -->
<div id="loginPage">
  <div class="card">

    <div id="loginForm" class="form active">
      <h2>Login with A-Apps</h2>
      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <div id="loginMsg" class="msg"></div>
      <div class="link" onclick="showSignup()">Don’t have an account? Sign up</div>
    </div>

    <div id="signupForm" class="form">
      <h2>Create A-Apps Account</h2>
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <button onclick="signup()">Sign Up</button>
      <div id="signupMsg" class="msg"></div>
      <div class="link" onclick="showLogin()">Already have an account? Log in</div>
    </div>

  </div>
</div>

<!-- WOW SCREEN -->
<div id="wowScreen">
  <p>{
"tier": "PREMIUM",
"source": "https://cdn.jsdelivr.net/gh/aapps2025a-hue/emojis-symbols-online/emojis-symbols-online.json",
"count": "All emojis",
"data": [ ... ]
}
</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDvqfC7dm1umT6pyftRJt2kF1d91uKF_DM",
    authDomain:"emojis-symbols-online.firebaseapp.com",
    projectId:"emojis-symbols-online",
    storageBucket:"emojis-symbols-online.firebasestorage.app",
    messagingSenderId:"1040623241425",
    appId:"1:1040623241425:web:9d5a068e6c54845fec1df0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  function showWOW() {
    loginPage.style.display = "none";
    wowScreen.style.display = "flex";
  }

  onAuthStateChanged(auth, (user) => {
    if (user) showWOW();
  });

  function cleanError(msg){
    return msg.replace(/^Firebase:\s*/i,"").replace(/\(auth\/.*\)$/i,"").trim();
  }

  window.showSignup = () => {
    signupForm.classList.add("active");
    loginForm.classList.remove("active");
  };

  window.showLogin = () => {
    loginForm.classList.add("active");
    signupForm.classList.remove("active");
  };

  window.signup = () => {
    createUserWithEmailAndPassword(auth,email.value,password.value)
      .then(()=> signupMsg.textContent="Account created!")
      .catch(err=> signupMsg.textContent=cleanError(err.message));
  };

  window.login = () => {
    signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value)
      .then(()=>{
        localStorage.setItem("aapps_pw",loginPassword.value);
        showWOW();
      })
      .catch(err=> loginMsg.textContent=cleanError(err.message));
  };
</script>

</body>
</html>
